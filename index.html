<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoscrew — FORCE16</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{ background:#000; color:#fff; font-family:'Orbitron',sans-serif; overflow:hidden; }

/* MAIN CENTER */ .container{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }

h1{ font-size:3rem; letter-spacing:4px; background:linear-gradient(90deg,#fff,#aaa,#fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-size:200% auto; animation:shine 4s linear infinite, flicker 2s infinite; }

p{ margin-top:10px; opacity:0.8; }

@keyframes shine{ 0%{background-position:0%} 100%{background-position:200%} }

@keyframes flicker{ 0%,18%,22%,25%,53%,57%,100%{opacity:1} 20%,24%,55%{opacity:0.4} }

/* SOCIALS */ .socials{ position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:20px; }

.socials a{ color:#fff; text-decoration:none; font-size:0.9rem; opacity:0.7; transition:0.3s; }

.socials a:hover{ opacity:1; text-shadow:0 0 10px #fff; }

/* TIME + DATE */ .hud{ position:absolute; top:20px; right:20px; font-size:0.8rem; opacity:0.7; text-align:right; }

/* VIEW COUNTER (LOCAL) */ .views{ position:absolute; top:20px; left:20px; font-size:0.8rem; opacity:0.7; }

/* SPACE WAR */ canvas{ position:fixed; top:0; left:0; z-index:-1; }

</style>
</head>
<body><canvas id="space"></canvas>

<div class="views" id="views">Views: 0</div><div class="hud" id="time"></div><div class="container">
  <h1>EXOSCREW</h1>
  <p>Minimal. Futuristic. Controlled Chaos.</p>
</div><div class="socials">
  <a href="https://youtube.com/@EXOSCREW" target="_blank">YT</a>
  <a href="https://instagram.com/EXOSCREW" target="_blank">IG</a>
  <a href="https://twitch.tv/exoscrew" target="_blank">TWITCH</a>
  <a href="https://t.me/exoscrew" target="_blank">TELEGRAM</a>
</div><script>

/* TIME */
function updateTime(){
  const now=new Date();
  document.getElementById("time").innerText=
    now.toLocaleTimeString()+"\n"+now.toDateString();
}
setInterval(updateTime,1000);
updateTime();

/* VIEW COUNTER (LOCAL STORAGE) */
let v=localStorage.getItem("views")||0;
v++;
localStorage.setItem("views",v);
document.getElementById("views").innerText="Views: "+v;

/* SPACE WAR */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#fff";
  stars.forEach(st=>{
    ctx.fillRect(st.x,st.y,st.s,st.s);
    st.y+=st.s;
    if(st.y>canvas.height)st.y=0;
  });

  requestAnimationFrame(draw);
}

draw();

/* LASERS */
setInterval(()=>{
  const x=Math.random()*canvas.width;
  ctx.strokeStyle="#fff";
  ctx.beginPath();
  ctx.moveTo(x,0);
  ctx.lineTo(x+50,200);
  ctx.stroke();
},300);

</script></body>
</html>
