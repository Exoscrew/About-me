<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoscrew</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow-x:hidden;font-family:'Inter';color:#00ffcc;background:#000;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
.page{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;opacity:0;pointer-events:none;transition:1s;}
.page.active{opacity:1;pointer-events:auto;}
.section{max-width:800px;width:90%;padding:20px;border-radius:20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(0,255,204,0.3);box-shadow:0 0 50px rgba(0,255,204,0.5);text-align:center;}
.hero h1, .signature h1{font-family:'Orbitron';font-size:clamp(2rem,5vw,3rem);text-shadow:0 0 35px #00ffcc,0 0 55px #00ffaa;margin-bottom:15px;}
.socials{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;}
.social{display:flex;flex-direction:column;justify-content:center;align-items:center;width:70px;height:70px;border-radius:15px;background:rgba(0,255,204,0.1);border:1px solid rgba(0,255,204,0.3);color:#00ffcc;text-decoration:none;font-size:16px;transition:0.4s;cursor:pointer;}
.social img{width:32px;height:32px;object-fit:contain;margin-bottom:5px;}
.sections-list{display:flex;flex-direction:column;gap:20px;cursor:pointer;font-size:1.5rem;}
.sections-list div:hover{color:#ff00ff;}
</style>
</head>
<body>
<canvas id="particles"></canvas><!-- Intro Page --><div id="intro" class="page active">
<div class="section hero">
<h1>Welcome!</h1>
<p style="cursor:pointer;margin-top:20px;font-size:1rem;">Click to continue</p>
</div>
</div><!-- Sections Index Page --><div id="page2" class="page">
<div class="section">
<h1>Sections</h1>
<div class="sections-list">
<div data-target="page3">i) About Me</div>
<div data-target="page4">ii) Skills</div>
<div data-target="page5">iii) Socials</div>
<div data-target="page6">iv) Signature</div>
</div>
</div>
</div><!-- About Me Page --><div id="page3" class="page">
<div class="section">
<h1>About Me</h1>
<p>I’m Exoscrew, male, from India.<br>Skills: HTML • Python • Java • C+ • C#</p>
</div>
</div><!-- Skills Page --><div id="page4" class="page">
<div class="section">
<h1>Skills</h1>
<div class="skill-card">HTML</div>
<div class="skill-card">Python</div>
<div class="skill-card">Java</div>
<div class="skill-card">C+</div>
<div class="skill-card">C#</div>
</div>
</div><!-- Socials Page --><div id="page5" class="page">
<div class="section socials">
<a href="https://youtube.com/@EXOSCREW" class="social"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">Yt</a>
<a href="https://t.me/exoscrew" class="social"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">Telegram</a>
<a href="https://twitch.tv/exoscrew" class="social"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Twitch">Twitch</a>
<a href="https://instagram.com/exoscrew" class="social"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384064.png" alt="Instagram">Insta</a>
</div>
</div><!-- Signature Page --><div id="page6" class="page">
<div class="section">
<h1 class="signature">エクソスクリュー</h1>
</div>
</div><!-- Contact Page --><div id="page7" class="page">
<div class="section">
<h1>Contact</h1>
<div id="chat"></div>
<input type="text" placeholder="Type your message..." id="chatInput">
</div>
</div><!-- Outro Page --><div id="page8" class="page">
<div class="section hero">
<h1>Thanks for visiting!</h1>
<h1 class="signature">エクソスクリュー</h1>
</div>
</div><script>
// Particle Background
const canvas=document.getElementById('particles');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
const particlesCount=1200;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particlesCount*3);
for(let i=0;i<particlesCount*3;i++){positions[i]=(Math.random()-0.5)*400;}
geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
const material=new THREE.PointsMaterial({color:0x00ffcc,size:1.8});
const particles=new THREE.Points(geometry,material);
scene.add(particles);
camera.position.z=120;
function animate(){requestAnimationFrame(animate);particles.rotation.y+=0.0015;renderer.render(scene,camera);}
animate();

// Pages Handling
const pages=document.querySelectorAll('.page');
let currentPage=1;
function showPage(index){pages.forEach(p=>p.classList.remove('active'));pages[index].classList.add('active');currentPage=index;}

// Intro click to continue
document.getElementById('intro').addEventListener('click',()=>{showPage(1);});

// Sections click navigation
document.querySelectorAll('.sections-list div').forEach(el=>{
el.addEventListener('click',()=>{
  const target=el.getAttribute('data-target');
  const targetPage=document.getElementById(target);
  const targetIndex=Array.from(pages).indexOf(targetPage);
  showPage(targetIndex);
});
});

// Arrow navigation
document.addEventListener('keydown',e=>{
if(e.key==='ArrowDown'){currentPage=Math.min(currentPage+1,pages.length-1);showPage(currentPage);}
if(e.key==='ArrowUp'){currentPage=Math.max(currentPage-1,1);showPage(currentPage);}
});

// Contact Chat Simulation
const chat=document.getElementById('chat');
const input=document.getElementById('chatInput');
if(input){input.addEventListener('keypress',e=>{if(e.key==='Enter' && input.value.trim()!==''){const msg=document.createElement('div');msg.textContent='You: '+input.value;chat.appendChild(msg);const reply=document.createElement('div');reply.textContent='Message received!';chat.appendChild(reply);input.value='';chat.scrollTop=chat.scrollHeight;}});
}

// Background Music
const bgMusic=new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_1e2f9a79d0.mp3?filename=cosmic-ambient-110728.mp3');
bgMusic.loop=true;
bgMusic.volume=0.25;
bgMusic.play();
</script></body>
</html>
