<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoscrew — FORCE15 Sigma Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow-x:hidden;scroll-behavior:smooth;font-family:'Inter';color:#00ffcc;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
.section{min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:20px;opacity:0;transform:translateY(50px);background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,255,204,0.05));backdrop-filter:blur(25px);border-radius:25px;margin:20px;box-shadow:0 0 50px rgba(0,255,204,0.3);}
.card{max-width:90%;margin:20px auto;padding:25px;border-radius:25px;background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,255,204,0.1));backdrop-filter:blur(30px);border:1px solid rgba(0,255,204,0.3);box-shadow:0 0 70px rgba(0,255,204,0.5);transition:0.8s;}
.hero h1, .signature h1{font-family:'Orbitron';font-size:3rem;text-shadow:0 0 35px #00ffcc,0 0 60px #00ffaa;margin-bottom:15px;text-align:center;}
.socials{display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
.social{display:flex;align-items:center;gap:10px;padding:14px;border-radius:18px;background:linear-gradient(135deg, rgba(0,255,204,0.05), rgba(0,255,204,0.1));border:1px solid rgba(0,255,204,0.2);color:#00ffcc;text-decoration:none;font-size:15px;flex:1 1 40%;transition:0.35s;}
.social:hover{transform:scale(1.3) rotate(5deg);box-shadow:0 0 80px #00ffcc;}
.social.yt:hover{color:red;box-shadow:0 0 80px red;}
.social.tg:hover{color:#00aaff;box-shadow:0 0 80px #00aaff;}
.social.twitch:hover{color:#6441a5;box-shadow:0 0 80px #6441a5;}
.social.ig:hover{color:#e4405f;box-shadow:0 0 80px #e4405f;}
.skill-card{margin:10px;padding:15px;border-radius:15px;background:linear-gradient(135deg, rgba(0,255,204,0.05), rgba(0,255,204,0.1));backdrop-filter:blur(15px);transition:0.3s;}
.skill-card:hover{transform:scale(1.15) rotate(2deg);box-shadow:0 0 50px #00ffcc;}
#chat{height:160px;overflow:auto;margin-bottom:10px;padding:12px;border-radius:15px;background:linear-gradient(135deg, rgba(0,255,204,0.05), rgba(0,255,204,0.1));}
input{width:100%;padding:12px;background:linear-gradient(135deg, rgba(0,255,204,0.05), rgba(0,255,204,0.1));color:#00ffcc;border:1px solid #00ffcc;outline:none;border-radius:15px;}
#secret{display:none;text-align:center;color:#ff00ff;margin:40px;font-size:1.3rem;}
#hiddenPage{display:none;text-align:center;color:#ff00ff;margin:40px;font-size:1.5rem;}
#intro, #outro{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;position:fixed;inset:0;width:100%;z-index:9999;background:linear-gradient(135deg,#0b0c1a,#1a1a2e);}
#outro{display:none;}
#outro h1{color:#00ffcc;font-size:4rem;text-shadow:0 0 50px #00ffcc,0 0 80px #00ffaa;}
.nav{position:fixed;top:15px;right:25px;z-index:1000;display:flex;gap:15px;}
.nav a{color:#00ffcc;text-decoration:none;font-weight:500;padding:10px 15px;border-radius:15px;background:linear-gradient(135deg, rgba(0,255,204,0.05), rgba(0,255,204,0.1));backdrop-filter:blur(15px);transition:0.5s;}
.nav a:hover{background:rgba(0,255,204,0.15);transform:scale(1.2) rotate(-2deg);}
</style>
</head>
<body><!-- Canvas for particles --><canvas id="particles"></canvas>

<!-- Intro --><div id="intro" class="section hero">
<h1>Welcome to Exoscrew Sigma Site</h1>
</div><!-- Navigation --><div class="nav">
<a href="#about">About Me</a>
<a href="#skills">Skills</a>
<a href="#socials">Socials</a>
<a href="#chatSection">AI Chat</a>
</div><!-- About Me --><div id="about" class="section card">
<h1>About Me</h1>
<p>I’m Exoscrew, male, from India.<br>Skills: HTML • Python • Java • C+ • C#</p>
</div><!-- Skills --><div id="skills" class="section">
<div class="skill-card">HTML</div>
<div class="skill-card">Python</div>
<div class="skill-card">Java</div>
<div class="skill-card">C+</div>
<div class="skill-card">C#</div>
</div><!-- Socials --><div id="socials" class="section socials">
<a href="https://youtube.com/@EXOSCREW" class="social yt">YouTube</a>
<a href="https://t.me/exoscrew" class="social tg">Telegram</a>
<a href="https://twitch.tv/exoscrew" class="social twitch">Twitch</a>
<a href="https://instagram.com/exoscrew" class="social ig">Instagram</a>
</div><!-- AI Chat --><div id="chatSection" class="section card">
<h1>AI Chat</h1>
<div id="chat"></div>
<input type="text" placeholder="Ask me anything..." id="chatInput">
</div><!-- Hidden / Secret Page --><div id="secret">Secret Easter Egg Activated!</div><!-- Outro --><div id="outro" class="section hero">
<h1>Thanks for visiting!</h1>
<h1 class="signature">エクソスクリュー</h1>
</div><script>
// Three.js Particles
const canvas=document.getElementById('particles');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const particlesCount=800;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particlesCount*3);
for(let i=0;i<particlesCount*3;i++){positions[i]=(Math.random()-0.5)*200;}
geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
const material=new THREE.PointsMaterial({color:0x00ffcc,size:1.5});
const particles=new THREE.Points(geometry,material);
scene.add(particles);
camera.position.z=100;
function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y+=0.0015;
  renderer.render(scene,camera);
}
animate();

// Intro Animation
gsap.from('#intro h1',{duration:2,opacity:0,y:50,ease:'power3.out',onComplete:()=>{document.getElementById('intro').style.display='none';}});

// Sections fade in on scroll
gsap.utils.toArray('.section').forEach(section=>{
  gsap.to(section,{opacity:1,y:0,duration:1,scrollTrigger:{trigger:section, start:'top 80%'}});
});

// AI Chat Simulation
const chat=document.getElementById('chat');
const input=document.getElementById('chatInput');
input.addEventListener('keypress',e=>{
  if(e.key==='Enter' && input.value.trim()!=='' ){
    const msg=document.createElement('div');msg.textContent='You: '+input.value;chat.appendChild(msg);
    const reply=document.createElement('div');reply.textContent='Exoscrew AI: I understand!';chat.appendChild(reply);
    input.value='';chat.scrollTop=chat.scrollHeight;
  }
});
</script></body>
</html>
