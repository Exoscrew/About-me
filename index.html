<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoscrew</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter';color:#00ffcc;background:#000;overflow-x:hidden;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
.container{max-width:900px;width:90%;margin:0 auto;padding:40px;display:flex;flex-direction:column;gap:60px;}
.section{padding:20px;border-radius:20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(0,255,204,0.3);box-shadow:0 0 50px rgba(0,255,204,0.5);text-align:center;opacity:0;}
.hero h1, .signature h1{font-family:'Orbitron';font-size:clamp(2rem,5vw,3rem);text-shadow:0 0 35px #00ffcc,0 0 55px #00ffaa;margin-bottom:15px;}
.socials{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;}
.social{display:flex;flex-direction:column;justify-content:center;align-items:center;width:70px;height:70px;border-radius:15px;background:rgba(0,255,204,0.1);border:1px solid rgba(0,255,204,0.3);color:#00ffcc;text-decoration:none;font-size:16px;transition:0.4s;cursor:pointer;}
.social img{width:32px;height:32px;object-fit:contain;margin-bottom:5px;}
.skill-card{display:inline-block;margin:5px;padding:10px 15px;border-radius:10px;background:rgba(0,255,204,0.1);border:1px solid rgba(0,255,204,0.3);}
#chat{height:150px;overflow-y:auto;border:1px solid rgba(0,255,204,0.3);padding:10px;margin-bottom:10px;border-radius:10px;background:rgba(0,0,0,0.2);}
#chatInput{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(0,255,204,0.3);background:rgba(0,0,0,0.1);color:#00ffcc;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="container">

<!-- Intro -->
<div class="section hero">
<h1>Welcome!</h1>
</div>

<!-- About Me -->
<div class="section">
<h1>About Me</h1>
<p>I’m Exoscrew, male, from India.<br>Hobbies: Coding, Gaming, Anime, Music.<br>My Works: Web Projects, AI Experiments, Interactive Sites.</p>
</div>

<!-- Skills -->
<div class="section">
<h1>Skills</h1>
<div class="skill-card">HTML</div>
<div class="skill-card">Python</div>
<div class="skill-card">Java</div>
<div class="skill-card">C+</div>
<div class="skill-card">C#</div>
</div>

<!-- Socials -->
<div class="section socials">
<a href="https://youtube.com/@EXOSCREW" class="social">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">Yt
</a>
<a href="https://t.me/exoscrew" class="social">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">Telegram
</a>
<a href="https://twitch.tv/exoscrew" class="social">
<img src="https://cdn-icons-png.flaticon.com/512/733/733635.png" alt="Twitch">Twitch
</a>
<a href="https://instagram.com/exoscrew" class="social">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">Insta
</a>
</div>

<!-- Signature -->
<div class="section">
<h1 class="signature">エクソスクリュー</h1>
</div>

<!-- Contact -->
<div class="section">
<h1>Contact</h1>
<div id="chat"></div>
<input type="text" placeholder="Type your message..." id="chatInput">
</div>

<!-- Outro -->
<div class="section hero">
<h1>Thanks for visiting!</h1>
<h1 class="signature">🕊</h1>
</div>

</div>

<script>
// Particle Background
const canvas=document.getElementById('particles');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// Particles
const particlesCount=1200;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particlesCount*3);
for(let i=0;i<particlesCount*3;i++){positions[i]=(Math.random()-0.5)*400;}
geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
const material=new THREE.PointsMaterial({color:0x00ffcc,size:1.8});
const particles=new THREE.Points(geometry,material);
scene.add(particles);

// Fighter Jets
const jetGeometry=new THREE.ConeGeometry(1,3,4);
const jetMaterial=new THREE.MeshBasicMaterial({color:0xff0000});
const jets=[];
for(let i=0;i<5;i++){
  const jet=new THREE.Mesh(jetGeometry,jetMaterial);
  jet.position.set(Math.random()*200-100,Math.random()*100-50,Math.random()*200-100);
  jet.rotation.x=Math.PI/2;
  scene.add(jet);
  jets.push({mesh:jet, speed:0.5+Math.random()});
}

camera.position.z=120;

// Animate everything
function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y+=0.0015;
  jets.forEach(j=>{
    j.mesh.position.x+=j.speed;
    j.mesh.position.y=Math.sin(j.mesh.position.x/20)*20;
    if(j.mesh.position.x>150) j.mesh.position.x=-150;
  });
  renderer.render(scene,camera);
}
animate();

// GSAP Fade-in Sections
gsap.utils.toArray('.section').forEach((section,i)=>{
  gsap.to(section,{opacity:1,duration:1.5,delay:i*0.4,ease:'power2.out'});
});

// Chat Simulation
const chat=document.getElementById('chat');
const input=document.getElementById('chatInput');
if(input){input.addEventListener('keypress',e=>{
  if(e.key==='Enter' && input.value.trim()!==''){
    const msg=document.createElement('div');
    msg.textContent='You: '+input.value;
    chat.appendChild(msg);
    const reply=document.createElement('div');
    reply.textContent='Message received!';
    chat.appendChild(reply);
    input.value='';
    chat.scrollTop=chat.scrollHeight;
  }
});}

// Background Music
const bgMusic=new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_1e2f9a79d0.mp3?filename=cosmic-ambient-110728.mp3');
bgMusic.loop=true;
bgMusic.volume=0.25;
bgMusic.play();
</script>
</body>
</html>
