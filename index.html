<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoscrew</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1;pointer-events:none}/* HUD */ .hud{position:fixed;top:10px;left:12px;font-size:12px;opacity:.9}

/* GLASS */ .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.25);border-radius:18px;box-shadow:0 10px 40px rgba(255,255,255,.06)}

.container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:min(900px,92%);padding:20px} h1{font-size:2.6rem;letter-spacing:3px;margin-bottom:10px}

.section{margin-top:18px;opacity:0;transform:translateY(16px);transition:.7s} .section.show{opacity:1;transform:translateY(0)}

.skills a{display:inline-block;margin:8px;padding:10px 14px;border:1px solid #fff;color:#fff;text-decoration:none;border-radius:12px} .skills a:hover{background:#fff;color:#000}

.socials a{ display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; margin:8px; border:1px solid #fff; border-radius:14px; color:#fff; text-decoration:none; position:relative; overflow:hidden; transition:0.3s; }

.socials a:hover{ background:#fff; color:#000; box-shadow:0 0 15px #fff; }

/* ripple effect */ .socials a::after{ content:""; position:absolute; width:10px; height:10px; background:rgba(255,255,255,0.6); border-radius:50%; transform:scale(0); opacity:0; }

.socials a:active::after{ animation:ripple 0.5s ease-out; }

@keyframes ripple{ from{transform:scale(0);opacity:0.8} to{transform:scale(6);opacity:0} } .socials a:hover{background:#fff;color:#000}

/* TRACE */ #traceBox{position:fixed;bottom:14px;right:14px;width:240px;padding:10px} #traceTitle{text-align:center;margin-bottom:6px} #traceMessages{max-height:100px;overflow:auto;margin-bottom:6px} #traceMessages div{opacity:0;animation:fadeIn .5s forwards} #traceInput{width:100%;background:#000;border:1px solid #fff;color:#fff;padding:6px;border-radius:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}} </style>

</head>
<body><div class="hud">
  <div id="time"></div>
  <div id="date"></div>
  <div id="views"></div>
</div><div class="container glass" id="panel">
  <h1 id="type"></h1>  <div class="section" id="about">
    <h2>About Me</h2>
    <p>Hobbies: coding, building systems, exploring ideas • Works: web apps, games, UI</p>
  </div>  <div class="section skills">
    <h2>Skills</h2>
    <a href="https://developer.mozilla.org/en-US/docs/Web/HTML" target="_blank">HTML</a>
    <a href="https://developer.mozilla.org/en-US/docs/Web/CSS" target="_blank">CSS</a>
    <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank">JS</a>
  </div>  <div class="section socials">
    <h2>Socials</h2>
    <a href="https://www.youtube.com/@EXOSCREW" target="_blank" title="YouTube @EXOSCREW"><i class="fab fa-youtube"></i></a>
    <a href="https://www.twitch.tv/exoscrew" target="_blank" title="Twitch exoscrew"><i class="fab fa-twitch"></i></a>
    <a href="https://www.instagram.com/exoscrew" target="_blank" title="Instagram EXOSCREW"><i class="fab fa-instagram"></i></a>
    <a href="https://t.me/exoscrew" target="_blank" title="Telegram @exoscrew"><i class="fab fa-telegram"></i></a>
  </div>  <div class="section">
    <h2>Contact</h2>
    <p>exoscrew@proton.me</p>
  </div>
</div><div id="traceBox" class="glass">
  <div id="traceTitle">Leave a Trace</div>
  <div id="traceMessages"></div>
  <input id="traceInput" placeholder="Say something..." />
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script><script>
// TYPEWRITER
const text = 'Exoscrew';
let i=0; const el=document.getElementById('type');
(function type(){ if(i<=text.length){ el.textContent=text.slice(0,i++); setTimeout(type,70);} })();

// TIME
setInterval(()=>{const n=new Date();time.textContent=n.toLocaleTimeString();date.textContent=n.toDateString();},1000);

// VIEWS
let v=localStorage.getItem('views')||0; v++; localStorage.setItem('views',v); views.textContent='Views: '+v;

// SECTIONS
setTimeout(()=>document.querySelectorAll('.section').forEach(e=>e.classList.add('show')),700);

// TRACE
const ti=traceInput, tm=traceMessages; let t=JSON.parse(localStorage.getItem('traces'))||[];
function r(){ tm.innerHTML=''; t.slice(-5).forEach(x=>{const d=document.createElement('div'); d.textContent='• '+x; tm.appendChild(d);}); }
ti.addEventListener('keypress',e=>{ if(e.key==='Enter'&&ti.value.trim()){ t.push(ti.value); localStorage.setItem('traces',JSON.stringify(t)); ti.value=''; r(); }}); r();

// THREE BG
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setClearColor(0x000000, 0);
renderer.setSize(innerWidth,innerHeight); document.body.appendChild(renderer.domElement);

// PARALLAX
let mx=0,my=0; addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5); my=(e.clientY/innerHeight-.5);});

// STARS
const g=new THREE.BufferGeometry(); const n=2000; const a=new Float32Array(n*3);
for(let i=0;i<n*3;i++) a[i]=(Math.random()-.5)*2000;
g.setAttribute('position',new THREE.BufferAttribute(a,3));
const stars=new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:1})); scene.add(stars);

// JETS
function jet(){const m=new THREE.Mesh(new THREE.ConeGeometry(1,4,3),new THREE.MeshBasicMaterial({color:0xffffff})); m.position.set(Math.random()*50-25,Math.random()*50-25,-50); scene.add(m); return m;}
const jets=[jet(),jet(),jet(),jet()];

// KITE (real kite shape)
const kiteShape = new THREE.Shape();
kiteShape.moveTo(0,2);
kiteShape.lineTo(1,0);
kiteShape.lineTo(0,-2);
kiteShape.lineTo(-1,0);
kiteShape.lineTo(0,2);

const kiteGeo = new THREE.ShapeGeometry(kiteShape);
const kiteMat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
const kite = new THREE.Mesh(kiteGeo, kiteMat);
kite.position.y = 50;
scene.add(kite);

// KITE TRAIL (fast fade particles)
const trailGeo = new THREE.BufferGeometry();
const trailCount = 120;
const trailPos = new Float32Array(trailCount * 3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos,3));

const trailMat = new THREE.PointsMaterial({
  color:0xffffff,
  size:2,
  transparent:true,
  opacity:0.4
});

const trail = new THREE.Points(trailGeo, trailMat);
scene.add(trail);

camera.position.z=60;

function loop(){ requestAnimationFrame(loop);
  stars.rotation.y+=0.0006;

  jets.forEach(j=>{
    j.position.x+=0.2;
    if(j.position.x>30) j.position.x=-30;
  });

  // SUPER FAST KITE + ULTRA PHYSICS
  kite.position.y -= 0.8;

  // zig-zag drift (wind effect)
  kite.position.x = Math.sin(Date.now()*0.01)*5;

  // rotation tilt
  kite.rotation.z += 0.1;

  if(kite.position.y < -50){
    kite.position.y = 50;
  }

  // TRAIL UPDATE (instant fade feel)
  for(let i=0;i<trailCount-1;i++){
    trailPos[i*3] = trailPos[(i+1)*3];
    trailPos[i*3+1] = trailPos[(i+1)*3+1];
    trailPos[i*3+2] = trailPos[(i+1)*3+2];
  }

  const last = trailCount-1;
  trailPos[last*3] = kite.position.x;
  trailPos[last*3+1] = kite.position.y;
  trailPos[last*3+2] = kite.position.z;

  trail.geometry.attributes.position.needsUpdate = true;

  // parallax
  camera.position.x = mx*5;
  camera.position.y = -my*5;

  // motion blur illusion (camera micro shake)
  camera.position.x += (Math.random()-0.5)*0.05;
  camera.position.y += (Math.random()-0.5)*0.05;

  renderer.render(scene,camera);
}
}
loop();

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script></body>
</html>
